name: Daily Horizon Summary

on:
  schedule:
    # Queue early to absorb GitHub Actions schedule delays; the job waits until 08:00 if it starts early.
    - cron: '5 7 * * *'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:  # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Wait until 08:00 Asia/Shanghai
        if: github.event_name == 'schedule'
        run: |
          now=$(date +%s)
          target=$(TZ=Asia/Shanghai date -d "$(TZ=Asia/Shanghai date +%F) 08:00:00" +%s)
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Asia/Shanghai now: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          if [ "$now" -lt "$target" ]; then
            wait_seconds=$((target - now))
            echo "Waiting ${wait_seconds}s until 08:00 Asia/Shanghai..."
            sleep "$wait_seconds"
          else
            echo "Already past 08:00 Asia/Shanghai; running immediately."
          fi

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon --hours 24

      - name: Generate social post drafts
        continue-on-error: true
        env:
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run python scripts/generate_social_posts.py --send-feishu

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
